<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cronograma — Sistema de Assinatura Digital</title>
  <link rel="stylesheet" href="./css/styles.css">
  <script type="module" src="./js/app.js"></script>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Sistema de Assinatura Digital de PDFs</h1>
    <p>UFRPE · UAB00084 Segurança da Informação · Cronograma por fases — tickets independentes</p>
  </div>
  <div class="header-stats">
    <div class="stat">
      <span class="stat-val">83</span>
      <span class="stat-label">tickets</span>
    </div>
    <div class="stat">
      <span class="stat-val">16</span>
      <span class="stat-label">semanas</span>
    </div>
    <div class="stat">
      <span class="stat-val">5</span>
      <span class="stat-label">fases</span>
    </div>
  </div>
</div>

<div class="phase-nav">
  <button class="pnav all active" onclick="filter('all')">Todas as fases</button>
  <button class="pnav p1" onclick="filter('p1')">Fase 1 — Fundação <span class="phase-count" id="c1"></span></button>
  <button class="pnav p2" onclick="filter('p2')">Fase 2 — Autenticação <span class="phase-count" id="c2"></span></button>
  <button class="pnav p3" onclick="filter('p3')">Fase 3 — Core PDF <span class="phase-count" id="c4"></span></button>
  <button class="pnav p4" onclick="filter('p4')">Fase 4 — Hardening <span class="phase-count" id="c5"></span></button>
  <button class="pnav p5" onclick="filter('p5')">Fase 5 — Qualidade <span class="phase-count" id="c6"></span></button>
</div>

<div class="legend">
  <div class="legend-item"><span class="w-dot" style="background:var(--w1)"></span>Peso 1 — trivial (&lt;2h)</div>
  <div class="legend-item"><span class="w-dot" style="background:var(--w2)"></span>Peso 2 — pequeno (2–5h)</div>
  <div class="legend-item"><span class="w-dot" style="background:var(--w3)"></span>Peso 3 — médio (5–12h)</div>
  <div class="legend-item"><span class="w-dot" style="background:var(--w5)"></span>Peso 5 — grande (12–24h)</div>
  <div class="legend-item" style="margin-left:auto">
    <span style="font-size:11px;color:var(--faint)">⬡ deps = bloqueia outros tickets</span>
  </div>
</div>

<div class="main" id="main"></div>

</body>
</html>
